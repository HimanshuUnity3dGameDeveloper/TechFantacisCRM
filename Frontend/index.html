<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Fantacis</title>
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"/>
    <link rel="stylesheet" href="log_sign.css" />
</head>
<body>
    <div class="container">
        <div id="login_card" class="login-form" style="display: flex">
            <div class="welcom-kit">
                <div class="header">
                    <h1>Techfanatics <span>CRM</span></h1>
                </div>
                <img src="/GIF File/Login.gif" alt="">
                <h2>Welcome Back!</h2>
                <p>Streamline your operations with our user-friendly admin dashboard.</p>
            </div>
            <div class="login-kit">
                <h2>Hello!</h2>
                <form id="loginForm" class="login_page">
                    <div class="login_card">
                        <label for="email">Email Address</label>
                        <div class="relative">
                            <span class="text-center">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" id="email" name="admin_email" autocomplete="username" placeholder="admin@hrgamix.com" required>
                        </div>
                    </div>

                    <div>
                        <label for="password">Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" id="password" name="admin_password" autocomplete="current-password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center text-gray-600">
                            <input type="checkbox" class="rounded border-gray-300 text-indigo-600 shadow-sm focus:ring-indigo-500 mr-2">
                            Remember me
                        </label>
                        <a href="#" class="text-indigo-600 hover:text-indigo-500 font-medium">Forgot Password?</a>
                    </div>

                    <button type="submit">
                        <span>Sign In</span>
                        <i class="fas fa-arrow-right ml-2" id="btnIcon"></i>
                    </button>
                    <div>
                        If don't have account? <a href="#" onclick="toggleAuth()">Sign Up</a>
                    </div>
                </form>
            </div>
        </div>

        <div id="signup_card" class="login-form" style="display: none">
            <div class="welcom-kit">
                <div class="header">
                    <h1>Techfanatics <span>CRM</span></h1>
                </div>
                <img src="/GIF File/Login.gif" alt="">
                <h2>Welcome Back!</h2>
                <p>Streamline your operations with our user-friendly admin dashboard.</p>
            </div>
            <div class="login-kit">
                <h2>Hello!</h2>
                <form id="signupForm" class="login_page">
                    <div class="login_card">
                        <label for="username">Full Name</label>
                        <div class="relative">
                            <span class="text-center">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" id="username" name="full_name" autocomplete="name" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="login_card">
                        <label for="reg-email">Email Address</label>
                        <div class="relative">
                            <span class="text-center">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" id="reg-email" name="reg_email" autocomplete="email" placeholder="admin@gmail.com" required>
                        </div>
                    </div>

                    <div>
                        <label for="reg-password">Password</label>
                        <div class="relative">
                            <span class="text-center">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" id="reg-password" name="reg_password" autocomplete="new-password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit">
                        <span>Sign Up</span>
                        <i class="fas fa-arrow-right ml-2" id="btnIcon"></i>
                    </button>
                    <div class="mt-6 text-center text-sm text-gray-600">
                        Already have an account? <a href="#" onclick="toggleAuth()">Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js">
    </script>
</body>
</html>
